<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>තර්ක - Facebook Page Launch</title>
  <link rel="icon" type="image/png" href="Tharka-Logo-2026.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+Sinhala:wght@400;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0302;
      font-family: 'Noto Sans Sinhala', sans-serif;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Fire / ember background ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 100% 55% at 50% 100%, #7a2000 0%, transparent 65%),
        radial-gradient(ellipse 70% 40% at 20% 90%,  #4a1000 0%, transparent 60%),
        radial-gradient(ellipse 70% 40% at 80% 90%,  #4a1000 0%, transparent 60%),
        radial-gradient(ellipse 50% 30% at 50% 50%,  #1a0500 0%, transparent 80%),
        #0a0302;
    }

    /* animated smoke / ember particles */
    .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(0)   scale(1);   opacity: 0; }
      10%  { opacity: .6; }
      80%  { opacity: .2; }
      100% { transform: translateY(-110vh) scale(.3); opacity: 0; }
    }

    /* ── Full-page layout ── */
    .frame {
      position: relative; z-index: 10;
      width: min(640px, 96vw);
      padding: 48px 32px 52px;
      text-align: center;
    }

    /* ── Top banner ── */
    .top-banner {
      margin-bottom: 36px;
      font-size: clamp(.75rem, 2.8vw, .95rem);
      font-weight: 700;
      color: #d4956a;
      line-height: 1.7;
      letter-spacing: .04em;
      text-shadow: 0 1px 6px rgba(0,0,0,.8);
      /* subtle fire-line under it */
      padding-bottom: 20px;
      border-bottom: 1px solid transparent;
      border-image: linear-gradient(90deg, transparent, #c05500 30%, #ff8030 50%, #c05500 70%, transparent) 1;
    }

    /* ── Floating logo ── */
    .logo-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      width: 340px; height: 340px;
    }
    .logo-glow {
      position: absolute; inset: -30px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(220,100,0,.5) 0%, rgba(180,50,0,.2) 40%, transparent 70%);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: .7; }
      50%       { transform: scale(1.12); opacity: 1; }
    }
    .logo-img {
      position: relative; z-index: 2;
      width: 320px; height: 320px;
      object-fit: contain;
      filter: drop-shadow(0 0 28px rgba(255,120,0,.9)) drop-shadow(0 0 60px rgba(200,60,0,.6));
      animation: float 3.6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-16px); }
    }

    /* logo placeholder (used when no image is provided) */
    .logo-placeholder {
      position: relative; z-index: 2;
      width: 320px; height: 320px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel Decorative', serif;
      font-size: 5rem; font-weight: 900;
      color: #ff8c30;
      text-shadow: 0 0 20px #ff6000, 0 0 50px #c03000;
      filter: drop-shadow(0 0 18px rgba(255,120,0,.8));
      animation: float 3.6s ease-in-out infinite;
      user-select: none;
    }

    /* ── Subtitle ── */
    .subtitle {
      font-size: clamp(.85rem, 2.8vw, 1rem);
      color: #c4855a;
      margin-bottom: 6px;
      letter-spacing: .04em;
    }
    .subtitle-si {
      font-size: clamp(1rem, 3.5vw, 1.2rem);
      color: #e8b88a;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .year {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: #ff9040;
      text-shadow: 0 0 18px #ff5500, 0 0 40px #c03000;
      margin-bottom: 36px;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #c05500, transparent);
      margin: 0 20px 28px;
    }

    /* ── Info row ── */
    .info-banner {
      background: linear-gradient(90deg, #7a2e00cc, #c05500cc, #7a2e00cc);
      border: 1px solid #e07a20;
      border-radius: 50px;
      padding: 12px 24px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .info-item {
      display: flex; align-items: center; gap: 8px;
      font-size: clamp(.75rem, 2.8vw, .9rem);
      color: #ffe0b0;
      font-weight: 700;
    }
    .info-icon { font-size: 1.1em; }

    /* ── Launch button ── */
    .launch-btn {
      position: relative;
      cursor: pointer;
      border: none;
      outline: none;
      background: linear-gradient(135deg, #c04500, #ff7020, #c04500);
      background-size: 200% 200%;
      animation: btnShimmer 3s ease infinite;
      color: #fff;
      font-family: 'Noto Sans Sinhala', sans-serif;
      font-size: clamp(.95rem, 3.5vw, 1.15rem);
      font-weight: 900;
      padding: 16px 56px;
      border-radius: 50px;
      letter-spacing: .08em;
      text-shadow: 0 1px 4px rgba(0,0,0,.6);
      box-shadow: 0 0 20px rgba(220,80,0,.6), 0 4px 20px rgba(0,0,0,.5);
      transition: transform .15s, box-shadow .15s;
    }
    .launch-btn:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(255,120,0,.8), 0 4px 24px rgba(0,0,0,.5); }
    .launch-btn:active { transform: scale(.97); }
    @keyframes btnShimmer {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    /* ── Countdown overlay ── */
    #countdown-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(5,1,0,.92);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    #countdown-overlay.active { display: flex; }

    .cd-label {
      font-size: clamp(.9rem, 3vw, 1.1rem);
      color: #d4956a;
      font-weight: 700;
      letter-spacing: .1em;
    }
    #cd-number {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 900;
      color: #ff6010;
      text-shadow: 0 0 30px #ff4000, 0 0 80px #c02000;
      animation: cdPop .5s ease;
      line-height: 1;
    }
    @keyframes cdPop {
      0%   { transform: scale(1.5); opacity: 0; }
      60%  { transform: scale(.95); }
      100% { transform: scale(1);   opacity: 1; }
    }
    .cd-bar-wrap {
      width: min(320px, 70vw);
      height: 6px;
      background: rgba(255,255,255,.1);
      border-radius: 99px;
      overflow: hidden;
    }
    .cd-bar {
      height: 100%;
      background: linear-gradient(90deg, #c04500, #ff7020);
      border-radius: 99px;
      transition: width 1s linear;
    }
    .cd-sub {
      font-size: clamp(.7rem, 2.5vw, .85rem);
      color: #a06040;
    }

    /* ── Leos logo strip ── */
    .footer-logos {
      margin-top: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      flex-direction: column;
    }
    .footer-logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .footer-logo-row img {
      height: 56px;
      width: auto;
      object-fit: contain;
      filter: brightness(.9) sepia(.2);
      transition: filter .2s;
    }
    .footer-logo-row img:hover { filter: brightness(1.1) sepia(0); }
    .footer-divider {
      width: 1px; height: 36px;
      background: linear-gradient(to bottom, transparent, #c05500, transparent);
      opacity: .5;
    }
    .footer-label {
      margin-top: 10px;
      font-size: .75rem;
      color: #f0cfb5;
      letter-spacing: .06em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      line-height: 1;
    }
    .footer-label-divider {
      display: inline-block;
      width: 1px;
      height: 1em;
      background: #c05500;
      opacity: .7;
      flex-shrink: 0;
      align-self: center;
    }
  </style>
</head>
<body>

<!-- Fire background -->
<div class="bg"></div>
<div class="particles" id="particles"></div>

<!-- Main card -->
<div class="frame">

  <div class="top-banner">
    තර්ක - මහේෂ් අබේවික්‍රම අනුස්මරණ විවාද හා කථික තරඟාවලිය<br>
  
  </div>

  <!-- Floating Logo -->
  <div class="logo-wrap">
    <div class="logo-glow"></div>
    <!-- Replace src with your logo path, e.g., src="logo.png" -->
    <img id="logo-img" class="logo-img" src="Tharka-Logo-2026.png"
         onerror="this.style.display='none'; document.getElementById('logo-fallback').style.display='flex';"
         alt="Tharka Logo" />
    <div id="logo-fallback" class="logo-placeholder" style="display:none;">තාර්ක</div>
  </div>


  <div class="year">2026</div>

  <div class="divider"></div>

 
  <button class="launch-btn" onclick="startLaunch()">
     &nbsp; Facebook පිටුව දියත් කරන්න
  </button>

  <div class="footer-logos">
    <div class="footer-logo-row">
      <img src="LEO LOGO SET NEW 25_26 (1) (1).png" alt="Leo Club Logos" />
      <div class="footer-divider"></div>
      <img src="Helakuru_logo.png" alt="Helakuru" style="height:36px;" />
    </div>
    <div class="footer-label">
      <span>මොරටුව විශ්ව විද්‍යාලීය ලියෝ සමාජය</span>
      <span class="footer-label-divider"></span>
      <span>සම අනුග්‍රහය</span>
    </div>
  </div>
</div>

<!-- Countdown overlay -->
<div id="countdown-overlay">
  <div class="cd-label">Facebook පිටුවට යොමු වෙමින්...</div>
  <div id="cd-number">10</div>
  <div class="cd-bar-wrap">
    <div class="cd-bar" id="cd-bar" style="width:100%"></div>
  </div>
  <div class="cd-sub">ගණන් කිරීම අවසන් වූ පසු ස්වයංක්‍රීයව විවෘත වේ</div>
</div>

<script>
  // ── Particle emitter ──────────────────────────────────────────
  const container = document.getElementById('particles');
  const COLORS = ['#ff6010','#ff3a00','#ff9030','#ffb860','#c04000'];

  for (let i = 0; i < 55; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 5 + 2;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      bottom:${Math.random()*-10}%;
      background:${COLORS[Math.floor(Math.random()*COLORS.length)]};
      animation-duration:${Math.random()*8+5}s;
      animation-delay:${Math.random()*8}s;
      filter:blur(${Math.random()>.5?1:0}px);
    `;
    container.appendChild(p);
  }

  // ── Countdown & redirect ──────────────────────────────────────
  // *** Change this to your actual Facebook page URL ***
  const FB_PAGE_URL = 'https://www.facebook.com/share/1DxPysnfgh/?mibextid=wwXIfr';

  function startLaunch() {
    const overlay = document.getElementById('countdown-overlay');
    const numEl   = document.getElementById('cd-number');
    const barEl   = document.getElementById('cd-bar');
    overlay.classList.add('active');

    let count = 10;
    numEl.textContent = count;
    barEl.style.width = '100%';

    const interval = setInterval(() => {
      count--;
      // restart pop animation
      numEl.style.animation = 'none';
      void numEl.offsetWidth; // reflow
      numEl.style.animation = 'cdPop .5s ease';

      numEl.textContent = count;
      barEl.style.width = (count / 10 * 100) + '%';

      if (count <= 0) {
        clearInterval(interval);
        window.location.href = FB_PAGE_URL;
      }
    }, 1000);
  }
</script>
</body>
</html>
