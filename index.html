<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>තර්ක - Facebook Page Launch</title>
  <link rel="icon" type="image/png" href="Tharka-Logo-2026.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Noto+Sans+Sinhala:wght@400;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0302;
      font-family: 'Noto Sans Sinhala', sans-serif;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Fire / ember background ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 100% 55% at 50% 100%, #7a2000 0%, transparent 65%),
        radial-gradient(ellipse 70% 40% at 20% 90%,  #4a1000 0%, transparent 60%),
        radial-gradient(ellipse 70% 40% at 80% 90%,  #4a1000 0%, transparent 60%),
        radial-gradient(ellipse 50% 30% at 50% 50%,  #1a0500 0%, transparent 80%),
        #0a0302;
    }

    /* animated smoke / ember particles */
    .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(0)   scale(1);   opacity: 0; }
      10%  { opacity: .6; }
      80%  { opacity: .2; }
      100% { transform: translateY(-110vh) scale(.3); opacity: 0; }
    }

    /* ── Full-page layout ── */
    .frame {
      position: relative; z-index: 10;
      width: min(640px, 96vw);
      padding: 48px 32px 52px;
      text-align: center;
    }

    /* ── Top banner ── */
    .top-banner {
      margin-bottom: 36px;
      font-size: clamp(.75rem, 2.8vw, .95rem);
      font-weight: 700;
      color: #d4956a;
      line-height: 1.7;
      letter-spacing: .04em;
      text-shadow: 0 1px 6px rgba(0,0,0,.8);
      /* subtle fire-line under it */
      padding-bottom: 20px;
      border-bottom: 1px solid transparent;
      border-image: linear-gradient(90deg, transparent, #c05500 30%, #ff8030 50%, #c05500 70%, transparent) 1;
    }

    /* ── Floating logo ── */
    .logo-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      width: 340px; height: 340px;
    }
    .logo-glow {
      position: absolute; inset: -30px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(220,100,0,.5) 0%, rgba(180,50,0,.2) 40%, transparent 70%);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1);   opacity: .7; }
      50%       { transform: scale(1.12); opacity: 1; }
    }
    .logo-img {
      position: relative; z-index: 2;
      width: 320px; height: 320px;
      object-fit: contain;
      filter: drop-shadow(0 0 28px rgba(255,120,0,.9)) drop-shadow(0 0 60px rgba(200,60,0,.6));
      animation: float 3.6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-16px); }
    }

    /* logo placeholder (used when no image is provided) */
    .logo-placeholder {
      position: relative; z-index: 2;
      width: 320px; height: 320px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cinzel Decorative', serif;
      font-size: 5rem; font-weight: 900;
      color: #ff8c30;
      text-shadow: 0 0 20px #ff6000, 0 0 50px #c03000;
      filter: drop-shadow(0 0 18px rgba(255,120,0,.8));
      animation: float 3.6s ease-in-out infinite;
      user-select: none;
    }

    /* ── Subtitle ── */
    .subtitle {
      font-size: clamp(.85rem, 2.8vw, 1rem);
      color: #c4855a;
      margin-bottom: 6px;
      letter-spacing: .04em;
    }
    .subtitle-si {
      font-size: clamp(1rem, 3.5vw, 1.2rem);
      color: #e8b88a;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .year {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: #ff9040;
      text-shadow: 0 0 18px #ff5500, 0 0 40px #c03000;
      margin-bottom: 36px;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #c05500, transparent);
      margin: 0 20px 28px;
    }

    /* ── Info row ── */
    .info-banner {
      background: linear-gradient(90deg, #7a2e00cc, #c05500cc, #7a2e00cc);
      border: 1px solid #e07a20;
      border-radius: 50px;
      padding: 12px 24px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .info-item {
      display: flex; align-items: center; gap: 8px;
      font-size: clamp(.75rem, 2.8vw, .9rem);
      color: #ffe0b0;
      font-weight: 700;
    }
    .info-icon { font-size: 1.1em; }

    /* ── Launch button ── */
    .launch-btn {
      position: relative;
      cursor: pointer;
      border: none;
      outline: none;
      background: linear-gradient(135deg, #c04500, #ff7020, #c04500);
      background-size: 200% 200%;
      animation: btnShimmer 3s ease infinite;
      color: #fff;
      font-family: 'Noto Sans Sinhala', sans-serif;
      font-size: clamp(.95rem, 3.5vw, 1.15rem);
      font-weight: 900;
      padding: 16px 56px;
      border-radius: 50px;
      letter-spacing: .08em;
      text-shadow: 0 1px 4px rgba(0,0,0,.6);
      box-shadow: 0 0 20px rgba(220,80,0,.6), 0 4px 20px rgba(0,0,0,.5);
      transition: transform .15s, box-shadow .15s;
    }
    .launch-btn:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(255,120,0,.8), 0 4px 24px rgba(0,0,0,.5); }
    .launch-btn:active { transform: scale(.97); }
    @keyframes btnShimmer {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    /* ── Countdown overlay ── */
    #countdown-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(5,1,0,.92);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    #countdown-overlay.active { display: flex; }

    .cd-label {
      font-size: clamp(.9rem, 3vw, 1.1rem);
      color: #d4956a;
      font-weight: 700;
      letter-spacing: .1em;
    }
    #cd-number {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 900;
      color: #ff6010;
      text-shadow: 0 0 30px #ff4000, 0 0 80px #c02000;
      animation: cdPop .5s ease;
      line-height: 1;
    }
    @keyframes cdPop {
      0%   { transform: scale(1.5); opacity: 0; }
      60%  { transform: scale(.95); }
      100% { transform: scale(1);   opacity: 1; }
    }
    .cd-bar-wrap {
      width: min(320px, 70vw);
      height: 6px;
      background: rgba(255,255,255,.1);
      border-radius: 99px;
      overflow: hidden;
    }
    .cd-bar {
      height: 100%;
      background: linear-gradient(90deg, #c04500, #ff7020);
      border-radius: 99px;
      transition: width 1s linear;
    }
    .cd-sub {
      font-size: clamp(.7rem, 2.5vw, .85rem);
      color: #a06040;
    }

    /* ── Music popup ── */
    #music-popup {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(5,1,0,.93);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .music-popup-box {
      width: min(380px, 90vw);
      background: linear-gradient(160deg, #1a0800, #2e1000);
      border: 1px solid #c05500;
      border-radius: 20px;
      padding: 40px 32px 36px;
      text-align: center;
      box-shadow: 0 0 60px rgba(200,70,0,.35), 0 8px 40px rgba(0,0,0,.7);
    }
    .music-popup-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 10px #ff6000);
    }
    .music-popup-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1rem, 4vw, 1.3rem);
      color: #ff9040;
      text-shadow: 0 0 16px #ff5000;
      margin-bottom: 10px;
    }
    .music-popup-sub {
      font-size: clamp(.78rem, 2.8vw, .9rem);
      color: #c4855a;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .music-popup-track {
      font-size: clamp(.72rem, 2.5vw, .82rem);
      color: #a06040;
      margin-bottom: 28px;
      font-style: italic;
    }
    .music-popup-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
    }
    .popup-btn-yes {
      flex: 1;
      cursor: pointer;
      border: none;
      outline: none;
      background: linear-gradient(135deg, #c04500, #ff7020);
      color: #fff;
      font-family: 'Noto Sans Sinhala', sans-serif;
      font-size: clamp(.85rem, 3vw, 1rem);
      font-weight: 900;
      padding: 13px 20px;
      border-radius: 50px;
      letter-spacing: .05em;
      box-shadow: 0 0 18px rgba(220,80,0,.5);
      transition: transform .15s, box-shadow .15s;
    }
    .popup-btn-yes:hover { transform: scale(1.05); box-shadow: 0 0 28px rgba(255,120,0,.7); }
    .popup-btn-no {
      flex: 1;
      cursor: pointer;
      border: 1px solid #604030;
      outline: none;
      background: transparent;
      color: #a06040;
      font-family: 'Noto Sans Sinhala', sans-serif;
      font-size: clamp(.85rem, 3vw, 1rem);
      font-weight: 700;
      padding: 13px 20px;
      border-radius: 50px;
      letter-spacing: .05em;
      transition: border-color .15s, color .15s;
    }
    .popup-btn-no:hover { border-color: #c05500; color: #d4956a; }

    /* ── Leos logo strip ── */
    .footer-logos {
      margin-top: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      flex-direction: column;
    }
    .footer-logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .footer-logo-row img {
      height: 56px;
      width: auto;
      object-fit: contain;
      filter: brightness(.9) sepia(.2);
      transition: filter .2s;
    }
    .footer-logo-row img:hover { filter: brightness(1.1) sepia(0); }
    .footer-divider {
      width: 1px; height: 36px;
      background: linear-gradient(to bottom, transparent, #c05500, transparent);
      opacity: .5;
    }
    .footer-label {
      margin-top: 10px;
      font-size: .75rem;
      color: #f0cfb5;
      letter-spacing: .06em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      line-height: 1;
    }
    .footer-label-divider {
      display: inline-block;
      width: 1px;
      height: 1em;
      background: #c05500;
      opacity: .7;
      flex-shrink: 0;
      align-self: center;
    }
  </style>
</head>
<body>

<!-- Music permission popup -->
<div id="music-popup">

    <div class="music-popup-title">Soundtrack</div>

      මෙම අත්දැකීම සම්පූර්ණ කිරීමට<br>සංගීතය සක්‍රිය කරන්නද?

  </div>

  <!-- Floating Logo -->

     &nbsp; Facebook පිටුව දියත් කරන්න

<!-- Countdown overlay -->
<div id="countdown-overlay">
  <div class="cd-label">Facebook පිටුවට යොමු වෙමින්...</div>
  <div id="cd-number">10</div>
  <div class="cd-bar-wrap">
    <div class="cd-bar" id="cd-bar" style="width:100%"></div>
  </div>
  <div class="cd-sub">ගණන් කිරීම අවසන් වූ පසු ස්වයංක්‍රීයව විවෘත වේ</div>
</div>

<script>
  // ── Particle emitter ──────────────────────────────────────────
  const container = document.getElementById('particles');
  const COLORS = ['#ff6010','#ff3a00','#ff9030','#ffb860','#c04000'];

  for (let i = 0; i < 55; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 5 + 2;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      bottom:${Math.random()*-10}%;
      background:${COLORS[Math.floor(Math.random()*COLORS.length)]};
      animation-duration:${Math.random()*8+5}s;
      animation-delay:${Math.random()*8}s;
      filter:blur(${Math.random()>.5?1:0}px);
    `;
    container.appendChild(p);
  }

  // ── Countdown & redirect ──────────────────────────────────────
  const FB_PAGE_URL = 'https://www.facebook.com/share/1DxPysnfgh/?mibextid=wwXIfr';

  // ── Audio Engine ──────────────────────────────────────────────
  let ac = null;
  let fireNodes = [];
  let ambientStarted = false;

  function getAC() {
    if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    return ac;
  }

  // Generate a buffer of brown noise (fire-like rumble)
  function makeBrownNoise(ctx, seconds) {
    const len  = ctx.sampleRate * seconds;
    const buf  = ctx.createBuffer(1, len, ctx.sampleRate);
    const data = buf.getChannelData(0);
    let last = 0;
    for (let i = 0; i < len; i++) {
      const white = Math.random() * 2 - 1;
      data[i] = (last + 0.02 * white) / 1.02;
      last = data[i];
      data[i] *= 3.5;
    }
    return buf;
  }

  // Fire crackle: single random pop
  function fireCrackle(ctx, masterGain) {
    const buf  = ctx.createBuffer(1, ctx.sampleRate * 0.06, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2);
    }
    const src  = ctx.createBufferSource();
    const filt = ctx.createBiquadFilter();
    const env  = ctx.createGain();
    src.buffer = buf;
    filt.type = 'bandpass';
    filt.frequency.value = 1200 + Math.random() * 1800;
    filt.Q.value = 0.8;
    env.gain.value = 0.18 + Math.random() * 0.22;
    src.connect(filt); filt.connect(env); env.connect(masterGain);
    src.start();
  }

  // Start looping fire ambience
  function startFireAmbience() {
    const ctx = getAC();
    const master = ctx.createGain();
    master.gain.setValueAtTime(0, ctx.currentTime);
    master.gain.linearRampToValueAtTime(0.7, ctx.currentTime + 2.5);
    master.connect(ctx.destination);
    fireNodes.push(master);

    // Brown noise base (low rumble)
    const noiseBuf = makeBrownNoise(ctx, 4);
    function loopNoise() {
      const src  = ctx.createBufferSource();
      const filt = ctx.createBiquadFilter();
      const gain = ctx.createGain();
      src.buffer = noiseBuf;
      filt.type = 'lowpass';
      filt.frequency.value = 380;
      gain.gain.value = 0.55;
      src.connect(filt); filt.connect(gain); gain.connect(master);
      src.onended = loopNoise;
      src.start();
      fireNodes.push(src);
    }
    loopNoise();

    // Deep sub drone
    const sub  = ctx.createOscillator();
    const subG = ctx.createGain();
    const subL = ctx.createOscillator(); // LFO for flutter
    const subLG = ctx.createGain();
    sub.type = 'sine'; sub.frequency.value = 58;
    subL.type = 'sine'; subL.frequency.value = 0.22;
    subLG.gain.value = 0.018;
    subG.gain.value = 0.09;
    subL.connect(subLG); subLG.connect(subG.gain);
    sub.connect(subG); subG.connect(master);
    sub.start(); subL.start();
    fireNodes.push(sub, subL);

    // Random crackles
    function scheduleCrackles() {
      fireCrackle(ctx, master);
      const next = 120 + Math.random() * 280;
      const t = setTimeout(scheduleCrackles, next);
      fireNodes.push({ _timeout: t });
    }
    scheduleCrackles();
  }

  // Fade out and stop fire ambience
  function stopFireAmbience() {
    if (!ac) return;
    const ctx = getAC();
    fireNodes.forEach(n => {
      if (n._timeout) { clearTimeout(n._timeout); return; }
      if (n instanceof GainNode) {
        n.gain.cancelScheduledValues(ctx.currentTime);
        n.gain.linearRampToValueAtTime(0, ctx.currentTime + 1.0);
      }
    });
    setTimeout(() => {
      fireNodes.forEach(n => { try { n.stop?.(); } catch(e){} });
      fireNodes = [];
    }, 1100);
  }

  // Metallic tick for each countdown beat
  function playTick(isLast) {
    const ctx = getAC();
    const freq = isLast ? 900 : 460;
    const dur  = isLast ? 0.38 : 0.13;

    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    osc.type = isLast ? 'square' : 'triangle';
    osc.frequency.value = freq;
    env.gain.setValueAtTime(isLast ? 0.5 : 0.3, ctx.currentTime);
    env.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    osc.connect(env); env.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + dur + 0.05);

    // Noise transient
    const nb  = ctx.createBuffer(1, ctx.sampleRate * 0.07, ctx.sampleRate);
    const nd  = nb.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = (Math.random()*2-1) * (1 - i/nd.length);
    const ns  = ctx.createBufferSource();
    const nf  = ctx.createBiquadFilter();
    const ng  = ctx.createGain();
    ns.buffer = nb;
    nf.type = 'bandpass'; nf.frequency.value = isLast ? 2400 : 1500; nf.Q.value = 2;
    ng.gain.setValueAtTime(isLast ? 0.35 : 0.18, ctx.currentTime);
    ng.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.1);
    ns.connect(nf); nf.connect(ng); ng.connect(ctx.destination);
    ns.start();
  }

  // Dramatic launch swoosh + rising chord
  function playLaunchSound() {
    const ctx = getAC();

    const nb  = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
    const nd  = nb.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = Math.random()*2-1;
    const ns  = ctx.createBufferSource();
    const nf  = ctx.createBiquadFilter();
    const ng  = ctx.createGain();
    ns.buffer = nb;
    nf.type = 'bandpass';
    nf.frequency.setValueAtTime(180, ctx.currentTime);
    nf.frequency.linearRampToValueAtTime(4500, ctx.currentTime + 1.5);
    nf.Q.value = 3;
    ng.gain.setValueAtTime(0.0001, ctx.currentTime);
    ng.gain.linearRampToValueAtTime(0.55, ctx.currentTime + 0.5);
    ng.gain.linearRampToValueAtTime(0.0001, ctx.currentTime + 2.0);
    ns.connect(nf); nf.connect(ng); ng.connect(ctx.destination);
    ns.start();

    [220, 277, 330, 440, 554].forEach((f, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      o.frequency.linearRampToValueAtTime(f * 1.6, ctx.currentTime + 1.6);
      const t = ctx.currentTime + i * 0.07;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.13, t + 0.25);
      g.gain.linearRampToValueAtTime(0.0001, ctx.currentTime + 1.7);
      o.connect(g); g.connect(ctx.destination);
      o.start(t); o.stop(ctx.currentTime + 1.8);
    });
  }

  // ── Music popup handlers ──────────────────────────────────────
  const hzAudio = document.getElementById('hz-audio');
  let musicEnabled = false;

  function allowMusic() {
    document.getElementById('music-popup').style.display = 'none';
    musicEnabled = true;
    hzAudio.volume = 0;
    hzAudio.play().catch(() => {});
    // Fade in
    let vol = 0;
    const fade = setInterval(() => {
      vol = Math.min(vol + 0.03, 0.75);
      hzAudio.volume = vol;
      if (vol >= 0.75) clearInterval(fade);
    }, 80);
    ambientStarted = true;
  }

  function denyMusic() {
    document.getElementById('music-popup').style.display = 'none';
  }

  function stopAllMusic() {
    // Fade out Hans Zimmer
    if (musicEnabled && !hzAudio.paused) {
      let vol = hzAudio.volume;
      const fade = setInterval(() => {
        vol = Math.max(vol - 0.05, 0);
        hzAudio.volume = vol;
        if (vol <= 0) { clearInterval(fade); hzAudio.pause(); }
      }, 60);
    }
    stopFireAmbience();
  }

  // ── Launch ────────────────────────────────────────────────────
  function startLaunch() {
    stopAllMusic();

    const overlay = document.getElementById('countdown-overlay');
    const numEl   = document.getElementById('cd-number');
    const barEl   = document.getElementById('cd-bar');
    overlay.classList.add('active');

    let count = 10;
    numEl.textContent = count;
    barEl.style.width = '100%';
    playTick(false);

    const interval = setInterval(() => {
      count--;
      numEl.style.animation = 'none';
      void numEl.offsetWidth;
      numEl.style.animation = 'cdPop .5s ease';
      numEl.textContent = count;
      barEl.style.width = (count / 10 * 100) + '%';

      if (count <= 0) {
        clearInterval(interval);
        setTimeout(() => { window.location.href = FB_PAGE_URL; }, 400);
      } else {
        playTick(count === 1);
      }
    }, 1000);
  }
</script>
